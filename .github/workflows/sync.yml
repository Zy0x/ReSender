name: Sync from forward-master

on:
  repository_dispatch:
    types: [forward-master-updated]
  workflow_dispatch:
    inputs:
      source_repository:
        description: "Source repository owner/name. Kosongkan untuk memakai file sync."
        required: false
        default: ""
      branch_selector:
        description: "Branch source yang disync."
        required: false
        default: ""
      dry_run:
        description: "Simulasi tanpa commit/push."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: sync-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync source into ReSender
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          path: target
          fetch-depth: 0

      - name: Resolve sync config
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SOURCE_REPOSITORY: ${{ github.event.inputs.source_repository }}
          INPUT_BRANCH_SELECTOR: ${{ github.event.inputs.branch_selector }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          DISPATCH_SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository }}
          DISPATCH_SOURCE_BRANCH: ${{ github.event.client_payload.source_branch }}
          DISPATCH_SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
          DISPATCH_DRY_RUN: ${{ github.event.client_payload.dry_run }}
        run: |
          set -euo pipefail

          CONFIG_FILE="${GITHUB_WORKSPACE}/target/sync"

          read_config() {
            local key="$1"
            if [ ! -f "$CONFIG_FILE" ]; then
              return 0
            fi
            awk -v wanted="$key" '
              /^[[:space:]]*($|#)/ { next }
              {
                line=$0
                split(line, parts, "=")
                key=parts[1]
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", key)
                if (key == wanted) {
                  sub(/^[^=]*=/, "", line)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                  print line
                  exit
                }
              }
            ' "$CONFIG_FILE"
          }

          trim() {
            local value="${1:-}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          first_non_empty() {
            local value
            for value in "$@"; do
              value="$(trim "$value")"
              if [ -n "$value" ]; then
                printf '%s' "$value"
                return 0
              fi
            done
            return 0
          }

          SOURCE_REPOSITORY="$(first_non_empty "$INPUT_SOURCE_REPOSITORY" "$DISPATCH_SOURCE_REPOSITORY" "$(read_config SOURCE_REPOSITORY)")"
          BRANCH_SELECTOR="$(first_non_empty "$INPUT_BRANCH_SELECTOR" "$DISPATCH_SOURCE_BRANCH" "$(read_config BRANCH_SELECTOR)" "main")"
          SYNC_MODE="$(first_non_empty "$(read_config SYNC_MODE)" "blacklist")"
          ALLOW_DELETE="$(first_non_empty "$(read_config ALLOW_DELETE)" "true")"
          BLACKLIST_PATHS="$(first_non_empty "$(read_config BLACKLIST_PATHS)" ".git/,.github/,.lovable/,.netlify/,node_modules/,dist/,build/,coverage/,.turbo/,supabase/.temp/,.env,.env.*,**/.env,**/.env.*,sync,/*.md")"
          WHITELIST_PATHS="$(first_non_empty "$(read_config WHITELIST_PATHS)" "")"
          COMMIT_PREFIX="$(first_non_empty "$(read_config COMMIT_PREFIX)" "chore: sync")"
          GIT_USER_NAME="$(first_non_empty "$(read_config GIT_USER_NAME)" "github-actions[bot]")"
          GIT_USER_EMAIL="$(first_non_empty "$(read_config GIT_USER_EMAIL)" "github-actions[bot]@users.noreply.github.com")"
          DRY_RUN="$(first_non_empty "$INPUT_DRY_RUN" "$DISPATCH_DRY_RUN")"
          if [ -z "$DRY_RUN" ]; then
            if [ "$EVENT_NAME" = "repository_dispatch" ]; then
              DRY_RUN="false"
            else
              DRY_RUN="true"
            fi
          fi

          if [[ ! "$SOURCE_REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "SOURCE_REPOSITORY harus berbentuk owner/repo: ${SOURCE_REPOSITORY:-<empty>}"
            exit 1
          fi

          if ! git check-ref-format --branch "$BRANCH_SELECTOR" >/dev/null 2>&1; then
            echo "Branch selector tidak valid: $BRANCH_SELECTOR"
            exit 1
          fi

          if [[ ! "$SYNC_MODE" =~ ^(whitelist|blacklist)$ ]]; then
            echo "SYNC_MODE tidak valid: $SYNC_MODE"
            exit 1
          fi

          if [[ ! "$ALLOW_DELETE" =~ ^(true|false)$ ]]; then
            echo "ALLOW_DELETE tidak valid: $ALLOW_DELETE"
            exit 1
          fi

          if [[ ! "$DRY_RUN" =~ ^(true|false)$ ]]; then
            echo "DRY_RUN tidak valid: $DRY_RUN"
            exit 1
          fi

          {
            echo "SOURCE_REPOSITORY=$SOURCE_REPOSITORY"
            echo "BRANCH_SELECTOR=$BRANCH_SELECTOR"
            echo "SYNC_MODE=$SYNC_MODE"
            echo "ALLOW_DELETE=$ALLOW_DELETE"
            echo "BLACKLIST_PATHS=$BLACKLIST_PATHS"
            echo "WHITELIST_PATHS=$WHITELIST_PATHS"
            echo "COMMIT_PREFIX=$COMMIT_PREFIX"
            echo "GIT_USER_NAME=$GIT_USER_NAME"
            echo "GIT_USER_EMAIL=$GIT_USER_EMAIL"
            echo "DRY_RUN=$DRY_RUN"
            echo "SOURCE_SHA=$DISPATCH_SOURCE_SHA"
          } >> "$GITHUB_ENV"

          echo "Source repository : $SOURCE_REPOSITORY"
          echo "Branch            : $BRANCH_SELECTOR"
          echo "Source SHA        : ${DISPATCH_SOURCE_SHA:-<manual>}"
          echo "Mode              : $SYNC_MODE"
          echo "Allow delete      : $ALLOW_DELETE"
          echo "Dry run           : $DRY_RUN"

      - name: Clone source repository
        shell: bash
        env:
          SYNC_SOURCE_PAT: ${{ secrets.SYNC_SOURCE_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${SYNC_SOURCE_PAT:-}" ]; then
            echo "Secret SYNC_SOURCE_PAT belum dikonfigurasi di repo target."
            exit 1
          fi

          AUTH_HEADER="$(printf 'x-access-token:%s' "$SYNC_SOURCE_PAT" | base64 | tr -d '\n')"

          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${AUTH_HEADER}" \
            clone --no-checkout "https://github.com/${SOURCE_REPOSITORY}.git" source

          cd source

          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${AUTH_HEADER}" \
            fetch origin "+refs/heads/*:refs/remotes/origin/*" --prune

          if ! git show-ref --verify --quiet "refs/remotes/origin/${BRANCH_SELECTOR}"; then
            echo "Branch source tidak ditemukan: ${BRANCH_SELECTOR}"
            exit 1
          fi

          git checkout -B "$BRANCH_SELECTOR" "origin/${BRANCH_SELECTOR}"

      - name: Sync files into target
        shell: bash
        run: |
          set -euo pipefail

          cd "${GITHUB_WORKSPACE}/target"

          git checkout -B "$BRANCH_SELECTOR"

          delete_flag=()
          if [ "$ALLOW_DELETE" = "true" ]; then
            delete_flag=(--delete)
          fi

          csv_to_args() {
            local csv="$1"
            local -n out_ref="$2"
            local item
            IFS=',' read -ra raw_items <<< "$csv"
            for item in "${raw_items[@]}"; do
              item="${item#"${item%%[![:space:]]*}"}"
              item="${item%"${item##*[![:space:]]}"}"
              if [ -n "$item" ]; then
                out_ref+=("$item")
              fi
            done
          }

          declare -a blacklist_paths=()
          declare -a whitelist_paths=()
          csv_to_args "$BLACKLIST_PATHS" blacklist_paths
          csv_to_args "$WHITELIST_PATHS" whitelist_paths

          if [ "$SYNC_MODE" = "whitelist" ]; then
            if [ "${#whitelist_paths[@]}" -eq 0 ]; then
              echo "WHITELIST_PATHS kosong."
              exit 1
            fi

            for path in "${whitelist_paths[@]}"; do
              if [[ "$path" = /* || "$path" = *".."* || "$path" = *"\\"* ]]; then
                echo "Path whitelist tidak aman: $path"
                exit 1
              fi

              if [ -e "${GITHUB_WORKSPACE}/source/$path" ]; then
                if [ -d "${GITHUB_WORKSPACE}/source/$path" ]; then
                  mkdir -p "$path"
                  rsync -a --checksum "${delete_flag[@]}" "${GITHUB_WORKSPACE}/source/$path/" "$path/"
                else
                  mkdir -p "$(dirname "$path")"
                  rsync -a --checksum "${delete_flag[@]}" "${GITHUB_WORKSPACE}/source/$path" "$path"
                fi
              else
                echo "Path whitelist tidak ditemukan di source: $path"
              fi
            done
          else
            exclude_args=(--exclude='.git')
            for path in "${blacklist_paths[@]}"; do
              exclude_args+=(--exclude "$path")
            done

            rsync -a --checksum "${delete_flag[@]}" "${exclude_args[@]}" "${GITHUB_WORKSPACE}/source/" .
          fi

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          cd "${GITHUB_WORKSPACE}/target"

          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"

          git add -A

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan file untuk disync."
            exit 0
          fi

          git status --short

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY_RUN=true, commit dan push dilewati."
            git diff --cached --stat
            exit 0
          fi

          git commit -m "${COMMIT_PREFIX} from ${SOURCE_REPOSITORY}@${BRANCH_SELECTOR}"
          git push origin "HEAD:${BRANCH_SELECTOR}"
